# Publishes the Vite frontend to GitHub Pages.
#
# ---------------------------------------------------------------------------
# REQUIRED FIRST (or deploy job fails with 404 / "Failed to create deployment"):
#   https://github.com/Nabeel5160/Chatbot/settings/pages
#   → Build and deployment → Source = "GitHub Actions" (NOT "Deploy from a branch")
# ---------------------------------------------------------------------------
#
# Also set (Actions → Variables):
#   VITE_API_BASE_URL = https://YOUR-API.onrender.com   (no trailing slash)
#
# Site URL (after success):
#   https://nabeel5160.github.io/Chatbot/
#
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          VITE_BASE_PATH: /Chatbot/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
