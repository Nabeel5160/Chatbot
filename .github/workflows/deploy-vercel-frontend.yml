# Deploy the Vite React frontend to Vercel on every push to main.
# One-time setup in GitHub: Settings → Secrets and variables → Actions → add:
#   VERCEL_TOKEN        (from Vercel → Account → Tokens)
#   VERCEL_ORG_ID       (from .vercel/project.json after `vercel link` locally, or Vercel dashboard URL)
#   VERCEL_PROJECT_ID   (same)
# In Vercel project → Settings → Environment Variables (Production):
#   VITE_API_BASE_URL   = https://your-api.onrender.com   (no trailing slash)
name: Deploy frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-vercel-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
